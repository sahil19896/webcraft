<section class="wc-cta wc-animate{% if content.background_image %} wc-cta--photo{% endif %}" data-wc-section="cta"{% if section_id %} data-wc-section-id="{{ section_id }}"{% endif %}{% if content.background_image %} style="background-image:url('{{ content.background_image }}')"{% endif %}>
	{% if content.background_image %}
	<div class="wc-cta__overlay" aria-hidden="true"></div>
	{% endif %}
	<div class="wc-container wc-cta__inner">
		<div>
			<h2>{{ content.title }}</h2>
			{% if content.subtitle %}<p>{{ content.subtitle }}</p>{% endif %}
		</div>
		{% if content.button_label %}
		<a class="wc-btn wc-btn--primary wc-btn--lg" href="{{ content.button_url or '#' }}">{{ content.button_label }}</a>
		{% endif %}
	</div>
</section>
