<section class="wc-section wc-animate" data-wc-section="faq"{% if section_id %} data-wc-section-id="{{ section_id }}"{% endif %}>
	<div class="wc-container wc-faq">
		{% if content.title %}<h2>{{ content.title }}</h2>{% endif %}
		{% for item in content['items'] or [] %}
		<details class="wc-faq__item">
			<summary>{{ item.question }}</summary>
			<p>{{ item.answer }}</p>
		</details>
		{% endfor %}
	</div>
</section>
