<footer class="wc-footer wc-animate" data-wc-section="footer"{% if section_id %} data-wc-section-id="{{ section_id }}"{% endif %}>
	<div class="wc-container wc-footer__inner">
		<div class="wc-logo">{{ (site_brand.brand_name if site_brand and site_brand.brand_name else None) or content.logo_text or 'WebCraft' }}</div>
		<nav class="wc-footer__nav">
			{% for item in footer_menu %}
			<a href="{{ item.url }}">{{ item.label }}</a>
			{% endfor %}
		</nav>
		<p class="wc-muted">{{ content.copyright }}</p>
	</div>
</footer>
