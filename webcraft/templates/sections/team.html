<section class="wc-section wc-animate" data-wc-section="team"{% if section_id %} data-wc-section-id="{{ section_id }}"{% endif %}>
	<div class="wc-container">
		{% if content.title %}<h2 class="wc-section__title">{{ content.title }}</h2>{% endif %}
		<div class="wc-grid wc-grid--2">
			{% for member in content.members or [] %}
			<article class="wc-card wc-card--team">
				{% if member.photo %}
				<img class="wc-team__photo" src="{{ member.photo }}" alt="{{ member.name or '' }}" loading="lazy">
				{% else %}
				<div class="wc-avatar">{{ (member.name or '?')[0] }}</div>
				{% endif %}
				<h3>{{ member.name }}</h3>
				<p class="wc-muted">{{ member.role }}</p>
				{% if member.bio %}<p>{{ member.bio }}</p>{% endif %}
			</article>
			{% endfor %}
		</div>
	</div>
</section>
