<section class="wc-section wc-section--surface wc-animate" data-wc-section="testimonials"{% if section_id %} data-wc-section-id="{{ section_id }}"{% endif %}>
	<div class="wc-container">
		{% if content.title %}<h2 class="wc-section__title">{{ content.title }}</h2>{% endif %}
		<div class="wc-grid wc-grid--2">
			{% for item in content['items'] or [] %}
			<blockquote class="wc-quote">
				<p>"{{ item.quote }}"</p>
				<footer>
					<strong>{{ item.author }}</strong>
					{% if item.role %}<span>{{ item.role }}</span>{% endif %}
				</footer>
			</blockquote>
			{% endfor %}
		</div>
	</div>
</section>
