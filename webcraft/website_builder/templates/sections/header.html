<header class="wc-header wc-animate" data-wc-section="header">
	<div class="wc-container wc-header__inner">
		<a class="wc-logo" href="/wc">{{ content.logo_text or 'WebCraft' }}</a>
		<nav class="wc-nav" aria-label="Main navigation">
			{% for item in header_menu %}
			<a href="{{ item.url }}" {% if item.open_in_new_tab %}target="_blank" rel="noopener"{% endif %}>
				{{ item.label }}
			</a>
			{% endfor %}
		</nav>
		{% if content.cta_label %}
		<a class="wc-btn wc-btn--primary" href="{{ content.cta_url or '#' }}">{{ content.cta_label }}</a>
		{% endif %}
	</div>
</header>
