<section class="wc-hero wc-animate wc-hero--{{ content.alignment or 'center' }}" data-wc-section="hero">
	<div class="wc-container wc-hero__grid">
		<div class="wc-hero__content">
			<p class="wc-eyebrow">WebCraft</p>
			<h1 class="wc-hero__title">{{ content.title }}</h1>
			{% if content.subtitle %}
			<p class="wc-hero__subtitle">{{ content.subtitle }}</p>
			{% endif %}
			<div class="wc-hero__actions">
				{% if content.button_label %}
				<a class="wc-btn wc-btn--primary wc-btn--lg" href="{{ content.button_url or '#' }}">{{ content.button_label }}</a>
				{% endif %}
				{% if content.secondary_button_label %}
				<a class="wc-btn wc-btn--ghost wc-btn--lg" href="{{ content.secondary_button_url or '#' }}">{{ content.secondary_button_label }}</a>
				{% endif %}
			</div>
		</div>
		{% if content.image %}
		<div class="wc-hero__media">
			<img src="{{ content.image }}" alt="" loading="lazy">
		</div>
		{% else %}
		<div class="wc-hero__orb" aria-hidden="true"></div>
		{% endif %}
	</div>
</section>
