<section class="wc-stats wc-animate" data-wc-section="stats">
	<div class="wc-container wc-stats__grid">
		{% for item in content.items or [] %}
		<div class="wc-stat">
			<div class="wc-stat__value">{{ item.value }}</div>
			<div class="wc-stat__label">{{ item.label }}</div>
		</div>
		{% endfor %}
	</div>
</section>
